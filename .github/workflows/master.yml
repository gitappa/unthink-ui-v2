name: CI unthink_ai-next

on:
  push:
    branches: 
      - master
  workflow_dispatch:

jobs:
  build:
    name: Cloud Run Deployment Prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master   # ✅ kept same

      - name: Use Node.js 12.x
        uses: actions/setup-node@v1     # ✅ kept same
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependency
        working-directory: "packages/web-client-next"   # ✅ changed only path
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Setup and run build on app
        working-directory: "packages/web-client-next"   # ✅ changed only path
        run: |
          npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

          # 🔥 EXACT ENV (only prefix changed)
          NEXT_PUBLIC_BACKEND_URL: "https://webbot-image-sync-314035436999.us-central1.run.app"
          NEXT_PUBLIC_ACCESS_KEY: "e191921352124a06a09bb811a86a5c3a"
          GA_TRACKING_ID: "G-FWT5BRF22H"

          NEXT_PUBLIC_SUPER_ADMIN_USER_NAME: "unthink-admin"
          NEXT_PUBLIC_CURRENT_STORE_NAME: "unthink_ai"

          NEXT_PUBLIC_ENABLE_VIEW_SIMILAR_PRODUCTS: "true"
          NEXT_PUBLIC_ENABLE_RECOMMENDATIONS: "false"
          NEXT_PUBLIC_IS_STORE_INSTANCE: "false"

          NEXT_PUBLIC_STAGING_ENV: "false"

          NEXT_PUBLIC_ENABLE_VENLY: "false"
          NEXT_PUBLIC_VENLY_ENVIRONMENT: "production"
          NEXT_PUBLIC_VENLY_CLIENT_ID: "unthink"

          NEXT_PUBLIC_ADMIN_USER_ID: "1668778066"
          NEXT_PUBLIC_CURRENT_STORE_ID: "78799553"

          NEXT_PUBLIC_ADMIN_HEDERA_WALLET_ID: ""
          NEXT_PUBLIC_ADMIN_HEDERA_UNTHINK_TOKEN_ADDRESS: ""

          NEXT_PUBLIC_AURA_YFRET_USER_COLL_BASE_URL: "https://auraprod.unthink.ai"

          NEXT_PUBLIC_ENABLE_TRANSFER_NFT: "true"

          NEXT_PUBLIC_WEBBOT_NFT_SERVICE__BASE_URL: "https://webbot-nft-prod-314035436999.us-central1.run.app"

          NEXT_PUBLIC_PDP_PAGE_ENABLED: "false"

          NEXT_PUBLIC_PAYMENT_URL: "https://unthink-dropp-payment-prod-314035436999.us-central1.run.app"

      - name: Setup GCP Service Account
        uses: google-github-actions/setup-gcloud@v0   # ✅ kept same
        with:
          project_id: ${{ secrets.DEV_GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.DEV_GCP_SA_KEY_NEW }}
          export_default_credentials: true

      - name: Authorize
        working-directory: "packages/web-client-next"   # ✅ changed only path
        run: |
          gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build
        working-directory: "packages/web-client-next"   # ✅ changed only path
        run: |
          docker build --tag us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next .

      - name: Push
        working-directory: "packages/web-client-next"   # ✅ changed only path
        run: |
          docker push us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next

      - name: Deploy
        working-directory: "packages/web-client-next"   # ✅ changed only path
        run: |
          gcloud run deploy unthink-ui-next \
          --region us-central1 \
          --image us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next \
          --platform managed \
          --project ${{ secrets.DEV_GCP_PROJECT_ID }}