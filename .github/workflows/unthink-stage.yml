name: CI unthink shop stage-next

on:
  push:
    branches: 
      - stage
  workflow_dispatch:

jobs:
  build:
    name: Cloud Run Deployment Prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Use Node.js 12.x
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependency
        working-directory: "packages/web-client-next"
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Setup and run build on app
        working-directory: "packages/web-client-next"
        run: |
          npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

          #GATSBY_BACKEND_URL: "https://unthink-stage-backend-kjrgp3u4gq-uc.a.run.app"
          NEXT_PUBLIC_BACKEND_URL: "https://unthink-stage-backend-834750050334.us-central1.run.app"
          NEXT_PUBLIC_ACCESS_KEY: "efb3f14edb5b488bb4aed81a90a791e7"

          GA_TRACKING_ID: "G-909K3N1VM0"

          NEXT_PUBLIC_STAGING_ENV: "true"

          NEXT_PUBLIC_SUPER_ADMIN_USER_NAME: "fashiondemo"

          NEXT_PUBLIC_INSTANCE_LOGO: ""

          NEXT_PUBLIC_AURA_HEADER_THEME: "light"
          NEXT_PUBLIC_SHARED_PROFILE_ON_ROOT: "fashiondemo"

          NEXT_PUBLIC_CURRENT_STORE_NAME: "fashiondemo"

          NEXT_PUBLIC_HOME_PAGE_URL: ""

          NEXT_PUBLIC_CURRENT_STORE_ID: "87353109"

          NEXT_PUBLIC_ENABLE_VIEW_SIMILAR_PRODUCTS: "false"
          NEXT_PUBLIC_ENABLE_RECOMMENDATIONS: "false"
          NEXT_PUBLIC_IS_STORE_INSTANCE: "true"

          NEXT_PUBLIC_AURA_YFRET_USER_COLL_BASE_URL: "https://aurastage.unthink.ai"

          NEXT_PUBLIC_ENABLE_VENLY: "false"
          NEXT_PUBLIC_VENLY_ENVIRONMENT: "staging"
          # NEXT_PUBLIC_VENLY_CLIENT_ID: "unthink"

          NEXT_PUBLIC_WEBBOT_NFT_SERVICE__BASE_URL: ""
          #NEXT_PUBLIC_WEBBOT_NFT_SERVICE__BASE_URL: "https://webbot-nft-stage-qvde2butpa-uc.a.run.app"
          #NEXT_PUBLIC_WEBBOT_NFT_SERVICE__BASE_URL: "https://webbot-nft-stage-314035436999.us-central1.run.app"

          NEXT_PUBLIC_ENABLE_TRANSFER_NFT: "false"

          NEXT_PUBLIC_ADMIN_USER_ID: "170445147951739"

          NEXT_PUBLIC_PDP_PAGE_ENABLED: "true"

          NEXT_PUBLIC_PAYMENT_URL: "https://unthink-dropp-payment-prod-314035436999.us-central1.run.app"

      - name: Setup GCP Service Account
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.DEV_GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.DEV_GCP_SA_KEY_NEW}}
          export_default_credentials: true

      - name: Authorize
        working-directory: "packages/web-client-next"
        run: |
          gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build
        working-directory: "packages/web-client-next"
        run: |
          docker build --tag us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next-unthink-stage .

      - name: Push
        working-directory: "packages/web-client-next"
        run: |
          docker push us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next-unthink-stage

      - name: Deploy
        working-directory: "packages/web-client-next"
        run: |
          gcloud run deploy unthink-ui-next-unthink-stage \
          --region us-central1 \
          --image us-docker.pkg.dev/${{ secrets.DEV_GCP_PROJECT_ID }}/gcr.io/unthink-ui-next-unthink-stage \
          --platform managed \
          --project ${{ secrets.DEV_GCP_PROJECT_ID }}